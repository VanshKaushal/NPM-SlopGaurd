name: Reproducibility Check
on:
  workflow_dispatch: {}

jobs:
  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci
      - name: Run reproducibility check
        run: npx ts-node ./scripts/reproducibility-check.ts
