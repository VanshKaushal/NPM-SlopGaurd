name: Provenance
on:
  push:
    tags: ['v*']

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
      - name: Install
        run: npm ci
      - name: Generate provenance (placeholder)
        run: node -e "const fs=require('fs'); const crypto=require('crypto'); const { execSync }=require('child_process'); const out=execSync('npm pack --json').toString(); const info=JSON.parse(out); const pack=Array.isArray(info)?info[0]:info; const tar=pack.filename; const hash=crypto.createHash('sha256').update(fs.readFileSync(tar)).digest('hex'); const prov={_type:'https://in-toto.io/Statement/v0.1', subject:[{name:tar,digest:{sha256:hash}}], predicateType:'https://slsa.dev/provenance/v1'}; fs.writeFileSync('provenance.json', JSON.stringify(prov,null,2));"
      - name: Verify integrity
        env:
          TS_NODE_FILES: 'true'
          TS_NODE_TRANSPILE_ONLY: 'true'
        run: node --loader ts-node/esm ./scripts/integrity-check.ts --provenance-file ./provenance.json --require-provenance
